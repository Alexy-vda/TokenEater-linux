name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache-dependency-path: daemon/go.sum

      - name: Build daemon (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../tokeneater-daemon-linux-amd64 ./...
        working-directory: daemon

      - name: Build daemon (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o ../tokeneater-daemon-linux-arm64 ./...
        working-directory: daemon

      - name: Package extras
        run: |
          tar -czf tokeneater-linux-extras.tar.gz \
            gnome-extension/ \
            tokeneater.service \
            dbus-activation/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tokeneater-daemon-linux-amd64
            tokeneater-daemon-linux-arm64
            tokeneater-linux-extras.tar.gz
